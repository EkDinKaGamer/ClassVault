name: Build APK

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Use Java 21 (FIX)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ✅ Install deps
      - name: Install dependencies
        run: npm install

      # ✅ Build Next.js
      - name: Build Next.js
        run: npm run build

      # ✅ Install Capacitor
      - name: Install Capacitor
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      # ✅ Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # ✅ Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
