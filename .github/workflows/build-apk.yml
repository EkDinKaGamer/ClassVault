name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Java (NO manual path!)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install deps
      - run: npm install

      # Build Next.js
      - run: npm run build

      # Install Capacitor
      - run: npm install @capacitor/cli @capacitor/core @capacitor/android

      # Sync Capacitor
      - run: npx cap sync android

      # ✅ Force Gradle to use correct Java
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

      # Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
